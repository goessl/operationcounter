site_name: operationcounter
site_url: https://goessl.github.io/operationcounter/
site_author: Sebastian Gössl
site_description: An arithmetic operation counting package.

repo_name: goessl/operationcounter
repo_url: https://github.com/goessl/operationcounter

copyright: Copyright &copy; 2025 Sebastian Gössl

theme:
  name: material
  features:
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/goessl/
      name: goessl on Github
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/lordgoessl/
      name: goessl on Instagram

plugins:
- mkdocstrings:
    default_handler: python
    handlers:
      python:
        options:
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            group_by_category: false
            docstring_style: numpy
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - OperationCounter: operationcounter.md
  - accumulators.md
  - iterators.md
